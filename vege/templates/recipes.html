<!DOCTYPE html>
<html>
<head>
    <title>Recipes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color: #f5f5f5;
        }
    </style>

</head>

<body>

<!-- ================= FORM SECTION ================= -->

<div class="container mt-5">

    <div class="card shadow-sm p-4 mx-auto"
         style="max-width:500px; border-radius:10px;">

        <h3 class="text-center mb-4">Add Recipes</h3>

        <form method="POST"
              enctype="multipart/form-data"
              action="{% url 'recipes' %}">

            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Recipe Name</label>
                <input type="text"
                       class="form-control"
                       name="recipe_name"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Recipe Description</label>
                <textarea class="form-control"
                          rows="3"
                          name="recipe_description"
                          required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Recipe Image</label>
                <input type="file"
                       class="form-control"
                       name="recipe_image"
                       required>
            </div>

            <button class="btn btn-success w-100">
                Add Recipe
            </button>

        </form>

    </div>

</div>

<!-- search icon -->
<div class="container mt-4">

<form method="GET">

    <label class="form-label">Search Food</label>

    <input type="text"
           name="search"
           value="{{ search }}"
           class="form-control mb-3"
           placeholder="Search recipe...">

    <button class="btn btn-primary">
        Search
    </button>

</form>

</div>


<!-- ================= TABLE SECTION ================= -->

<div class="container mt-5">

    <table class="table table-bordered table-hover shadow-sm">

        <thead class="table-dark">
            <tr>
                <th style="width:2%">#</th>
                <th style="width:20%">Recipe Name</th>
                <th style="width:45%">Description</th>
                <th style="width:15%">Image</th>
                <th style="width:15%">Actions</th>
            </tr>
        </thead>

        <tbody>

            {% for recipe in recipes %}
            <tr>

                <td>{{ forloop.counter }}</td>

                <td>
                    <b>{{ recipe.recipe_name }}</b>
                </td>

                <td style="max-width:400px;">
                    {{ recipe.recipe_description }}
                </td>

                <td>

                    {% if recipe.recipe_image %}
                        <img src="{{ recipe.recipe_image.url }}"
                            width="120"
                            style="border-radius:8px;">
                    {% else %}
                        <span class="text-muted">No Image</span>
                    {% endif %}

                </td>

                <td style="width:140px">

                    <a href="/delete_recipe/{{recipe.id}}" 
                    class="btn btn-danger w-100 mb-2">
                        Delete
                    </a>

                    <a href="/update_recipe/{{recipe.id}}" 
                    class="btn btn-success w-100">
                        Update
                    </a>

                </td>

            </tr>
            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
