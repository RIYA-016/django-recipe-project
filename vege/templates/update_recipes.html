<!DOCTYPE html>
<html>
<head>
    <title>Recipes</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color: #f5f5f5;
        }
    </style>

</head>

<body>

<!-- ================= FORM SECTION ================= -->

<div class="container mt-5">

    <div class="card shadow-sm p-4 mx-auto"
         style="max-width:500px; border-radius:10px;">

        <h3 class="text-center mb-4">Update Recipe</h3>

        <form method="POST"
            enctype="multipart/form-data"
            action="{% url 'update_recipe' recipe.id %}">

            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Recipe Name</label>
                <input type="text"
                       class="form-control"
                       name="recipe_name"
                       value = "{{recipe.recipe_name}}"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Recipe Description</label>
                <textarea class="form-control"
                          rows="3"
                          name="recipe_description"
                          required>{{recipe.recipe_description}}</textarea>

            </div>

            <div class="mb-3">
                <label class="form-label">Recipe Image</label>
                <input type="file"
                       class="form-control"
                       name="recipe_image"
                       >
            </div>

            <button class="btn btn-success w-100">
                Update Recipe
            </button>

        </form>

    </div>

</div>


</body>
</html>
